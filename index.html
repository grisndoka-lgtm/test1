<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>index.html</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #0d0d0d; color: #fff; }

    nav {
      position: fixed;
      top: 0;
      width: 100%;
      padding: 20px 40px;
      display: flex;
      justify-content: space-between;
      z-index: 10;
      background: rgba(0,0,0,0.5);
    }

    nav a { color: #fff; text-decoration: none; margin-left: 20px; font-size: 14px; }

    .hero {
      height: 100vh;
      position: relative;
      overflow: hidden;
    }

    .hero iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      border: 0;
    }

    .hero-content {
      position: relative;
      z-index: 2;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    .hero h1 { font-size: 48px; font-weight: 600; }
    .hero p { margin-top: 10px; font-size: 18px; opacity: 0.8; }

    .section { padding: 100px 40px; max-width: 1100px; margin: auto; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
    }

    .grid iframe {
      width: 100%;
      aspect-ratio: 16/9;
      border-radius: 10px;
      border: 0;
    }

    .cta {
      text-align: center;
      padding: 100px 20px;
    }

    .cta a {
      display: inline-block;
      padding: 12px 30px;
      border: 1px solid #fff;
      text-decoration: none;
      color: #fff;
      margin-top: 20px;
    }

  </style>
</head>
<body>

  <nav>
    <div>GRISELDO</div>
    <div>
      <a href="#home">Home</a>
      <a href="#films">Films</a>
      <a href="#contact">Contact</a>
    </div>
  </nav>

  <section id="home" class="hero">
    <iframe src="<div style="position:relative; width:100%; height:0px; padding-bottom:42.500%"><iframe allow="fullscreen" allowfullscreen height="100%" src="https://streamable.com/e/93ss2k?muted=1" width="100%" style="border:none; width:100%; height:100%; position:absolute; left:0px; top:0px; overflow:hidden;"></iframe></div>" allowfullscreen></iframe>
    <div class="hero-content">
      <h1>Cinematic Wedding Films</h1>
      <p>Crafted with emotion</p>
    </div>
  </section>

  <section id="films" class="section grid">
    <iframe src="<div style="position:relative; width:100%; height:0px; padding-bottom:42.500%"><iframe allow="fullscreen" allowfullscreen height="100%" src="https://streamable.com/e/6axktj?" width="100%" style="border:none; width:100%; height:100%; position:absolute; left:0px; top:0px; overflow:hidden;"></iframe></div>" allowfullscreen></iframe>
  </section>

  <section id="contact" class="cta">
    <h2>Let’s tell your story</h2>
    <a href="#">Contact</a>
  </section>

</body>
</html>
